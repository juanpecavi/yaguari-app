<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yaguarí — Historial</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a1a;color:#e8e8e8;font-size:14px}
header{background:#111;color:#fff;padding:14px 16px;position:sticky;top:0;z-index:100;box-shadow:0 3px 10px rgba(0,0,0,0.5);border-bottom:2px solid #cc0000}
header h1{font-size:17px;font-weight:700;letter-spacing:0.02em}
header p{font-size:11px;opacity:0.5;margin-top:1px}
.lema{font-size:11px;font-weight:700;color:#fff;letter-spacing:0.15em;text-transform:uppercase;margin-top:8px;border-top:1px solid #2a2a2a;padding-top:7px}
header h1{font-size:18px;font-weight:600}
header p{font-size:12px;opacity:0.7;margin-top:2px}
.global-stats{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;padding:12px;background:#111;border-bottom:1px solid #2a2a2a}
.gs{text-align:center;padding:6px 4px}
.gs .val{font-size:18px;font-weight:700;line-height:1}
.gs .lbl{font-size:10px;color:#555;margin-top:2px}
.gs.win .val{color:#4caf50}
.gs.draw .val{color:#ffb300}
.gs.loss .val{color:#ef5350}
.filter-bar{padding:10px 12px;background:#111;border-bottom:1px solid #2a2a2a;display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{padding:4px 12px;border-radius:20px;border:1px solid #444;background:#222;font-size:12px;cursor:pointer;color:#999}
.filter-btn.active{background:#cc0000;color:#fff;border-color:#cc0000}
.temp-list{padding:8px;background:#1a1a1a;min-height:100vh}
.temp-card{background:#222;border-radius:10px;margin-bottom:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.5);border:1px solid #333}
.temp-header{padding:12px;cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none;-webkit-tap-highlight-color:transparent}
.temp-header:active{background:#2a2a2a}
.t-num{font-size:16px;font-weight:700;min-width:32px;color:#cc0000}
.t-year{font-size:13px;color:#888}
.div-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px}
.div-B{background:#1a3a1a;color:#4caf50}
.div-C{background:#1a2a3a;color:#64b5f6}
.div-D{background:#3a2a00;color:#ffb300}
.div-E{background:#3a1a1a;color:#ef5350}
.t-stats{display:flex;gap:6px;margin-left:auto;align-items:center;flex-shrink:0}
.t-stats span{font-size:12px}
.t-stats .g{color:#4caf50;font-weight:600}
.t-stats .e{color:#ffb300;font-weight:600}
.t-stats .p{color:#ef5350;font-weight:600}
.t-stats .pj{color:#666}
.chev{font-size:18px;color:#555;transition:transform 0.2s;margin-left:4px;flex-shrink:0}
.chev.open{transform:rotate(180deg)}
.temp-body{display:none;border-top:1px solid #333}
.temp-body.open{display:block}
.rueda-label{font-size:11px;font-weight:600;color:#cc0000;padding:8px 12px 4px;text-transform:uppercase;letter-spacing:0.08em;background:#1a1a1a}
.partido-row{padding:10px 12px;border-bottom:1px solid #2a2a2a;cursor:pointer;-webkit-tap-highlight-color:transparent}
.partido-row:active{background:#2a2a2a}
.partido-row:last-child{border-bottom:none}
.pr-top{display:flex;align-items:center;gap:6px}
.pr-fecha{font-size:11px;color:#aaa;min-width:24px}
.pr-rival{flex:1;font-size:13px;color:#ccc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pr-rival .cond{font-size:10px;color:#666;margin-right:2px}
.pr-score{font-size:14px;font-weight:700;min-width:40px;text-align:center;color:#fff}
.badge{font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;min-width:22px;text-align:center}
.badge-G{background:#1a3a1a;color:#4caf50}
.badge-E{background:#3a2a00;color:#ffb300}
.badge-P{background:#3a1a1a;color:#ef5350}
.badge-S{background:#2a2a2a;color:#555}
.pr-date{font-size:11px;color:#555;margin-top:3px;padding-left:30px}
.partido-detail{display:none;padding:12px;background:#1a1a1a;border-bottom:1px solid #2a2a2a}
.partido-detail.open{display:block}
.loading{color:#555;font-size:13px;text-align:center;padding:8px}
.det-goles{margin-bottom:12px}
.det-title{font-size:11px;font-weight:600;color:#cc0000;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px}
.gol-row{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:13px}
.gol-min{font-size:11px;color:#666;min-width:30px}
.gol-icon{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.gol-yag{background:#4caf50}
.gol-opp{background:#cc0000}
.gol-pp{font-size:10px;color:#ef5350;margin-left:2px}
.det-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
.det-col h4{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px}
.player{display:flex;gap:4px;align-items:center;padding:2px 0;font-size:12px}
.player .num{font-size:10px;color:#666;min-width:18px;text-align:right}
.cap-badge{font-size:9px;background:#3a2a00;color:#ffb300;padding:1px 4px;border-radius:3px;margin-left:2px}
.cambio{display:flex;gap-4px;align-items:center;padding:2px 0;font-size:12px;gap:4px}
.cambio .min{font-size:10px;color:#666;min-width:24px}
.cambio .entra{color:#4caf50}
.cambio .sale{color:#cc0000}
.empty-det{font-size:12px;color:#555;font-style:italic}
.in-curso{font-size:10px;background:#3a1a1a;color:#cc0000;padding:2px 6px;border-radius:8px}
.no-data{text-align:center;padding:20px;color:#555;font-size:13px}
@media(max-width:380px){
  .global-stats{grid-template-columns:repeat(4,1fr)}
  .gs:nth-child(n+5):nth-child(-n+7){display:none}
  .det-cols{grid-template-columns:1fr}
}

.tab-nav{display:flex;background:#111;border-bottom:2px solid #222;position:sticky;top:80px;z-index:90}
.tab-nav button{flex:1;padding:10px 4px;background:transparent;border:none;color:#666;font-size:12px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color 0.15s}
.tab-nav button.active{color:#cc0000;border-bottom-color:#cc0000}
.tab-nav button:active{background:#1a1a1a}
.tab-page{display:none}
.tab-page.active{display:block}

/* Tabla de posiciones */
.tabla-controls{padding:10px 12px;background:#111;border-bottom:1px solid #2a2a2a;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.tabla-select{background:#222;border:1px solid #444;color:#e8e8e8;padding:5px 10px;border-radius:6px;font-size:12px}
.tabla-wrap{overflow-x:auto;padding:8px}
.tabla{width:100%;border-collapse:collapse;font-size:12px}
.tabla th{padding:8px 6px;text-align:left;color:#666;font-weight:600;border-bottom:1px solid #333;white-space:nowrap}
.tabla th.num{text-align:center}
.tabla td{padding:8px 6px;border-bottom:1px solid #222;white-space:nowrap}
.tabla td.num{text-align:center;color:#aaa}
.tabla tr.yaguari td{color:#fff;font-weight:600}
.tabla tr.yaguari td.team-name{color:#cc0000}
.tabla td.pts{font-weight:700;color:#fff;text-align:center}
.tabla tr:last-child td{border-bottom:none}
.pos-num{font-size:11px;color:#666;text-align:center}

/* Estadísticas individuales */
.stats-controls{padding:10px 12px;background:#111;border-bottom:1px solid #2a2a2a;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.stats-loading{text-align:center;padding:24px;color:#555;font-size:13px}
.player-card{background:#222;border-radius:10px;margin:8px;padding:14px;border:1px solid #333}
.player-card h3{font-size:14px;font-weight:600;color:#fff;margin-bottom:10px}
.player-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pstat{background:#1a1a1a;border-radius:8px;padding:10px;text-align:center}
.pstat .val{font-size:22px;font-weight:700;color:#fff}
.pstat .val.goles{color:#4caf50}
.pstat .val.rojas{color:#cc0000}
.pstat .lbl{font-size:10px;color:#666;margin-top:3px}
.player-list{padding:8px}
.player-search{background:#222;border:1px solid #444;color:#e8e8e8;padding:8px 12px;border-radius:8px;font-size:13px;width:100%;margin-bottom:8px}
.player-item{padding:10px 12px;border-bottom:1px solid #2a2a2a;cursor:pointer;font-size:13px;color:#ccc}
.player-item:hover,.player-item:active{background:#2a2a2a;color:#fff}
.player-item .goals{color:#4caf50;font-weight:600;margin-left:6px}
.player-item .red{color:#cc0000;font-weight:600;margin-left:6px}
.back-btn{background:transparent;border:1px solid #444;color:#aaa;padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;margin:8px 12px}
</style>
</head>

async function loadTabla() {
  const t = document.getElementById('tabla-temp').value;
  if(!t) return;

  document.getElementById('tabla-content').innerHTML = '<div class="stats-loading">Cargando tabla...</div>';

  const series1 = SERIES_MAP[t] || [];
  const series2 = SERIES2_MAP[t] || [];

  async function fetchTabla(seriesList) {
    const allTeams = {};
    for(const serie of seriesList) {
      const cacheKey = t + '_' + serie;
      let data;
      if(tablaCache[cacheKey]) {
        data = tablaCache[cacheKey];
      } else {
        try {
          const url = TABLA_API + '?action=cargarPosiciones&temporada=' + t + '&deporte=F%C3%9ATBOL&torneo=Mayores%20Masculino&serie=' + encodeURIComponent(serie);

          const r = await fetch(proxy);
          const j = await r.json();
          data = JSON.parse(j.contents || '[]');
          tablaCache[cacheKey] = data;
        } catch(e) { data = []; }
      }
      data.forEach(row => {
        const name = row.Institucion;
        if(!allTeams[name]) allTeams[name] = {pj:0,g:0,e:0,p:0,gf:0,gc:0};
        allTeams[name].pj += parseInt(row.PJ||0);

function renderP3(partidos) {
  // Group by label
  const groups = {};
  partidos.forEach(x => {
    const lbl = x._rueda_label || 'Extra';
    if(!groups[lbl]) groups[lbl] = [];
    groups[lbl].push(x);
  });
  return Object.entries(groups).map(([lbl, ps]) =>
    '<div class="rueda-label">'+lbl+'</div>'+ps.map(x=>partidoHTML(x)).join('')
  ).join('');
}

function calcStats(arr){
  let pj=0,g=0,e=0,p=0,gf=0,gc=0;
  arr.forEach(x=>{
    const h=x.Locatario.includes('YAGUARI');
    const mg=parseInt(h?x.GL:x.GV),og=parseInt(h?x.GV:x.GL);
    pj++;gf+=mg;gc+=og;
    if(mg>og)g++;else if(mg===og)e++;else p++;
  });
  return{pj,g,e,p,gf,gc,pts:g*3+e};
}

function getRes(x){
  const h=x.Locatario.includes('YAGUARI');
  const mg=parseInt(h?x.GL:x.GV),og=parseInt(h?x.GV:x.GL);
  if(mg>og)return'G';if(mg===og)return'E';return'P';
}

function fmtDate(fh){
  if(!fh)return'';
  const d=(fh.split(' ')[0]||'').split('-');
  return d.length===3?d[2]+'/'+d[1]+'/'+d[0].slice(2):'';
}



function setFilter(f,btn){
  currentFilter=f;

  btn.classList.add('active');

  const tKeys=Object.keys(TEMPS).reverse().filter(t=>currentFilter==='all'||TEMPS[t].div===currentFilter);

function toggleT(t){
  const b=document.getElementById('tb'+t);
  const c=document.getElementById('chev'+t);
  const open=b.style.display==='block';
  b.style.display=open?'none':'block';
  c.style.transform=open?'':'rotate(180deg)';
}

function toggleP(id){
  const el=document.getElementById('pd'+id);
  if(!el)return;
  const open=el.style.display==='block';
  if(open){el.style.display='none';return;}
  el.style.display='block';
  if(detCache[id]){el.innerHTML=detCache[id];return;}

  // Find if Yaguarí is home or away
  const row=el.previousElementSibling;
  const cond=row?row.querySelector('.cond'):null;
  const isHome=cond&&cond.textContent.trim()==='vs';
  const side=isHome?'Locatario':'Visitante';
  const oppSide=isHome?'Visitante':'Locatario';

  const data=JUG_DATA[id+'_'+side]||{};
  const oppData=JUG_DATA[id+'_'+oppSide]||{};

  // Parse compact format: t=[name,carne,cap], c=[entra,carne_e,sale,carne_s,min], g=[name,carne,ec,min], e=[name,carne]
  const yagTit=(data.t||[]);
  const yagCam=(data.c||[]);
  const yagGol=(data.g||[]);
  const yagExp=(data.e||[]);
  const oppGol=(oppData.g||[]);

  const allG=[
    ...yagGol.map(g=>({n:g[0],ec:g[2],min:g[3],team:'y'})),
    ...oppGol.map(g=>({n:g[0],ec:g[2],min:g[3],team:'o'}))
  ].sort((a,b)=>parseInt(a.min||0)-parseInt(b.min||0));

  const golesH=allG.length?allG.map(g=>{
    const forYag=isHome?(g.team==='y'?g.ec!=='1':g.ec==='1'):(g.team==='y'?g.ec==='1':g.ec!=='1');
    const ownGoal=g.team==='y'&&!forYag;
    const dotCls=forYag?'gol-yag':'gol-opp';
    const minStr=(g.min||"")+"'";
    const ppLabel=ownGoal?' <span style="font-size:10px;color:#cc0000">(p.p.)</span>':'';
    return '<div class="gol-row"><span class="gol-min">'+minStr+'</span>'
      +'<div class="gol-icon '+dotCls+'"></div>'
      +'<span style="font-weight:'+(g.team==='y'?'600':'400')+';color:'+(g.team==='y'?'#fff':'#aaa')+'">'+g.n+ppLabel+'</span></div>';
  }).join(''):'<span class="empty-det">Sin goles registrados</span>';

  const plH=arr=>arr.length?arr.map(p=>
    '<div class="player"><span class="num">'+p[1]+'</span>'+p[0]+(p[2]===1?'<span class="cap-badge">C</span>':'')+'</div>'
  ).join(''):'<span class="empty-det">Sin datos</span>';

  const camH=arr=>arr.length?arr.map(c=>
    '<div class="cambio"><span class="min">'+(c[4]||'')+'\'</span>'
    +'<span class="entra">&#8679; '+c[0]+'</span>'
    +'<span class="sale">&#8681; '+c[2]+'</span></div>'
  ).join(''):'<span class="empty-det">Sin cambios</span>';

  const html='<div class="det-goles"><div class="det-title">Goles</div>'+golesH+'</div>'
    +'<div class="det-cols">'
    +'<div><div class="det-title">Titulares Yaguarí</div>'+plH(yagTit)
    +'<div class="det-title" style="margin-top:8px">Cambios Yaguarí</div>'+camH(yagCam)+'</div>'
    +'<div><div class="det-title">Titulares rival</div>'
    +'<span class="empty-det">Sin datos</span>'
    +'</div></div>';

  detCache[id]=html;
  el.innerHTML=html;
}

function showJugador(i) {
  const p = window._jugPlayers ? window._jugPlayers[i] : null;
  if(!p) return;
  const t = document.getElementById('jug-temp').value;
  const rueda = document.getElementById('jug-rueda').value;

  // Build goles detail and season breakdown
  const golesDetail = [];
  const seasons = [];

  const temps = t === 'all' ? Object.keys(TEMPS) : [t];
  temps.forEach(temp => {
    const p1 = P1[temp]||[], p2 = P2[temp]||[], p3x = P3[temp]||[];
    const partidos = rueda==='1'?[...p1,...p3x] : rueda==='2'?p2 : [...p1,...p2,...p3x];
    let pj=new Set(), goles=0, rojas=0;
    for(const x of partidos) {
      const isHome2 = x.Locatario.includes('YAGUARI');
      const side = isHome2 ? 'Locatario' : 'Visitante';
      const data = JUG_DATA[x.ID+'_'+side];
      if(!data) continue;
      const inTit=(data.t||[]).some(pl=>pl[0]===p.nombre);
      const inCam=(data.c||[]).some(c=>c[0]===p.nombre);
      if(inTit||inCam) pj.add(x.ID);
      (data.g||[]).forEach(g=>{
        if(g[0]===p.nombre){
          pj.add(x.ID);
          const isG=isHome2?g[2]!=='1':g[2]==='1';
          if(isG){
            goles++;
            const rival = isHome2 ? x.Visitante : x.Locatario;
            const fecha = (x.Fecha_Hora||'').split(' ')[0];
            golesDetail.push({min:g[3], rival, year:TEMPS[temp].year, temp, score: isHome2?x.GL+'-'+x.GV:x.GV+'-'+x.GL, fecha});
          }
        }
      });
      (data.e||[]).forEach(e=>{ if(e[0]===p.nombre) rojas++; });
    }
    if(pj.size>0) seasons.push({temp, year:TEMPS[temp].year, div:TEMPS[temp].div, pj:pj.size, goles, rojas});
  });

  // Goles detail table
  let golesHTML = '';
  if(golesDetail.length > 0) {
    golesHTML = '<div class="det-title" style="margin-top:14px">Goles anotados</div>'
      +'<div style="overflow-x:auto"><table class="tabla" style="margin-top:6px"><thead><tr>'
      +'<th>Min</th><th>Rival</th><th class="num">Res.</th><th class="num">Año</th>'
      +'</tr></thead><tbody>'
      +golesDetail.map(g=>'<tr>'
        +'<td style="color:#4caf50;font-weight:600">'+(g.min||'?')+"'</td>"
        +'<td style="color:#ccc">'+g.rival+'</td>'
        +'<td class="num" style="color:#fff">'+g.score+'</td>'
        +'<td class="num" style="color:#888">'+g.year+'</td>'
        +'</tr>').join('')
      +'</tbody></table></div>';
  }

  // Season breakdown (only in 'all' mode)
  let tempBreakdown = '';
  if(t === 'all' && seasons.length > 0) {
    tempBreakdown = '<div class="det-title" style="margin-top:14px">Por temporada</div>'
      +'<div style="overflow-x:auto"><table class="tabla" style="margin-top:6px"><thead><tr>'
      +'<th>T</th><th>Año</th><th class="num">Div</th><th class="num">PJ</th><th class="num">G</th><th class="num">🟥</th>'
      +'</tr></thead><tbody>'
      +seasons.map(s=>'<tr>'
        +'<td style="color:#cc0000;font-weight:600">'+s.temp+'</td>'
        +'<td style="color:#888">'+s.year+'</td>'
        +'<td class="num"><span class="div-badge div-'+s.div+'">'+s.div+'</span></td>'
        +'<td class="num">'+s.pj+'</td>'
        +'<td class="num" style="color:#4caf50">'+s.goles+'</td>'
        +'<td class="num" style="color:#cc0000">'+s.rojas+'</td>'
        +'</tr>').join('')
      +'</tbody></table></div>';
  }

  const el = document.getElementById('jug-content');
  el.innerHTML =
    '<button class="back-btn" onclick="renderJugadores(currentJugData)">← Volver</button>'
    +'<div class="player-card">'
    +'<h3>'+p.nombre+'</h3>'
    +'<div class="player-stats">'
    +'<div class="pstat"><div class="val">'+p.pj+'</div><div class="lbl">Partidos</div></div>'
    +'<div class="pstat"><div class="val goles">'+p.goles+'</div><div class="lbl">Goles</div></div>'
    +'<div class="pstat"><div class="val rojas">'+p.rojas+'</div><div class="lbl">Rojas</div></div>'
    +'</div>'
    +golesHTML
    +tempBreakdown
    +'</div>';
}

function initTablaSelects() {
  const sel = document.getElementById('tabla-temp');

  });

}
function initJugSelects() {

// ---- TABLA DE POSICIONES ----



async function loadTabla() {
  const t = document.getElementById('tabla-temp').value;
  if(!t) return;

  document.getElementById('tabla-content').innerHTML = '<div class="stats-loading">Cargando tabla...</div>';

  const series1 = SERIES_MAP[t] || [];
  const series2 = SERIES2_MAP[t] || [];

  async function fetchTabla(seriesList) {
    const allTeams = {};
    for(const serie of seriesList) {
      const cacheKey = t + '_' + serie;
      let data;
      if(tablaCache[cacheKey]) {
        data = tablaCache[cacheKey];
      } else {
        try {
          const url = TABLA_API + '?action=cargarPosiciones&temporada=' + t + '&deporte=F%C3%9ATBOL&torneo=Mayores%20Masculino&serie=' + encodeURIComponent(serie);
          const proxy = 'https://api.allorigins.win/get?url=' + encodeURIComponent(url);
          const r = await fetch(proxy);
          const j = await r.json();
          data = JSON.parse(j.contents || '[]');
          tablaCache[cacheKey] = data;
        } catch(e) { data = []; }
      }
      data.forEach(row => {
        const name = row.Institucion;
        if(!allTeams[name]) allTeams[name] = {pj:0,g:0,e:0,p:0,gf:0,gc:0};
        allTeams[name].pj += parseInt(row.PJ||0);
        allTeams[name].g  += parseInt(row.PG||0);
        allTeams[name].e  += parseInt(row.PE||0);
        allTeams[name].p  += parseInt(row.PP||0);
        allTeams[name].gf += parseInt(row.GF||0);
        allTeams[name].gc += parseInt(row.GC||0);
      });
    }
    return Object.entries(allTeams)
      .map(([name, s]) => ({name, ...s, pts: s.g*3 + s.e, dif: s.gf - s.gc}))
      .sort((a,b) => b.pts - a.pts || b.dif - a.dif || b.gf - a.gf);
  }

  function renderTable(sorted, label) {
    if(!sorted.length) return '';
    const rows = sorted.map((team, i) => {
      const isYag = team.name.includes('YAGUARI');
      return '<tr class="' + (isYag ? 'yaguari' : '') + '">'
        + '<td class="pos-num num">' + (i+1) + '</td>'
        + '<td class="team-name">' + team.name + '</td>'
        + '<td class="num">' + team.pj + '</td>'
        + '<td class="num" style="color:#4caf50">' + team.g + '</td>'
        + '<td class="num" style="color:#ffb300">' + team.e + '</td>'
        + '<td class="num" style="color:#ef5350">' + team.p + '</td>'
        + '<td class="num">' + team.gf + '</td>'
        + '<td class="num">' + team.gc + '</td>'
        + '<td class="num" style="color:' + (team.dif > 0 ? '#4caf50' : team.dif < 0 ? '#ef5350' : '#aaa') + '">' + (team.dif > 0 ? '+' : '') + team.dif + '</td>'
        + '<td class="pts">' + team.pts + '</td>'
        + '</tr>';
    }).join('');
    return '<div class="rueda-label" style="padding:10px 12px 6px">' + label + '</div>'
      + '<div class="tabla-wrap"><table class="tabla"><thead><tr>'
      + '<th class="num">#</th><th>Equipo</th><th class="num">PJ</th><th class="num">G</th><th class="num">E</th><th class="num">P</th><th class="num">GF</th><th class="num">GC</th><th class="num">DIF</th><th class="num">PTS</th>'
      + '</tr></thead><tbody>' + rows + '</tbody></table></div>';
  }

  const [t1, t2] = await Promise.all([fetchTabla(series1), fetchTabla(series2)]);

  const html = renderTable(t1, '1ª Rueda') + (t2.length ? renderTable(t2, '2ª Rueda') : '');

  document.getElementById('tabla-content').innerHTML = html || '<div class="stats-loading">Sin datos para esta temporada</div>';
}


// ---- JUGADORES ----

function loadJugadores() {
  const t = document.getElementById('jug-temp').value;
  const rueda = document.getElementById('jug-rueda').value;
  const cacheKey = t + '_' + rueda;
  if(jugCache[cacheKey]) { renderJugadores(jugCache[cacheKey]); return; }

  const players = {};
  function getOrAdd(nombre, carne) {
    const key = (carne || nombre || '').trim();
    if(!key) return null;
    if(!players[key]) players[key] = {nombre: nombre || key, pj: new Set(), goles: 0, pp: 0, rojas: 0};
    return players[key];
  }
  function processPartidos(partidos) {
    for(const x of partidos) {
      const isHome = x.Locatario.includes('YAGUARI');
      const side = isHome ? 'Locatario' : 'Visitante';
      const data = JUG_DATA[x.ID + '_' + side];
      if(!data) continue;
      (data.t||[]).forEach(p => { const pl=getOrAdd(p[0],p[1]); if(pl) pl.pj.add(x.ID); });
      (data.c||[]).forEach(c => { const pl=getOrAdd(c[0],c[1]); if(pl) pl.pj.add(x.ID); });
      (data.g||[]).forEach(g => { const pl=getOrAdd(g[0],g[1]); if(!pl) return; pl.pj.add(x.ID); const isGoal=isHome?g[2]!=='1':g[2]==='1'; if(isGoal) pl.goles++; });
      (data.e||[]).forEach(e => { const pl=getOrAdd(e[0],e[1]); if(pl) pl.rojas++; });
    }
  }

  const temps = t === 'all' ? Object.keys(TEMPS) : [t];
  temps.forEach(temp => {
    const p1=P1[temp]||[], p2=P2[temp]||[], p3x=P3[temp]||[];
    const partidos = rueda==='1'?[...p1,...p3x] : rueda==='2'?p2 : [...p1,...p2,...p3x];
    processPartidos(partidos);
  });

  const result = Object.values(players)
    .map(p => ({...p, pj: p.pj.size}))
    .filter(p => p.pj > 0)
    .sort((a,b) => b.pj - a.pj || b.goles - a.goles);

  jugCache[cacheKey] = result;
  renderJugadores(result);
}

function renderJugadores(players) {
  currentJugData = players;
  document.getElementById('jug-content').innerHTML =
    '<div style="padding:8px 12px"><input class="player-search" placeholder="Buscar jugador..." oninput="filterJugadores(this.value)" id="jug-search"></div>'
    + '<div id="jug-list"></div>';
  renderJugList(players);
}

function filterJugadores(q) {
  if(!currentJugData) return;
  const filtered = q ? currentJugData.filter(p => p.nombre.toLowerCase().includes(q.toLowerCase())) : currentJugData;
  renderJugList(filtered);
}

function renderJugList(players) {
  window._jugPlayers = players;
  const el = document.getElementById('jug-list');
  if(!players.length) { el.innerHTML = '<div class="stats-loading">Sin resultados</div>'; return; }
  el.innerHTML = players.map((p,i) =>
    '<div class="player-item" onclick="showJugador('+i+')">'
    + '<span style="font-weight:600;color:#fff">'+p.nombre+'</span>'
    + '<span class="goals"> ⚽ '+p.goles+'</span>'
    + '<span style="color:#aaa;margin-left:6px">PJ:'+p.pj+'</span>'
    + (p.rojas > 0 ? '<span class="red"> 🟥 '+p.rojas+'</span>' : '')
    + '</div>'
  ).join('');
}
